<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Millennium Tower Lift Tracker</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121212; color: #f5f5f7; text-align: center; padding: 20px; }
        .card { background: #1c1c1e; padding: 30px; border-radius: 20px; max-width: 400px; margin: 40px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #3a3a3c; }
        h1 { color: #ff453a; font-size: 2.5rem; margin: 0; }
        .days { font-size: 6rem; font-weight: bold; color: #ff453a; margin: 10px 0; }
        p { color: #aeaeb2; line-height: 1.5; font-size: 1.1rem; }
        .btn { display: inline-block; background: #007aff; color: white; text-decoration: none; padding: 15px 25px; border-radius: 12px; font-weight: bold; margin-top: 20px; transition: 0.2s; }
        .btn:hover { background: #0056b3; }
        .footer { font-size: 0.8rem; color: #636366; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>MILLENNIUM TOWER STAIRMASTER UNLOCKED</h1>
        <p>Days without a working lift:</p>
        <div class="days">9</div> 
        <p>Hadrian Management is currently "waiting for a quote" while we hike up 20 floors in a heatwave. Don't let them stay comfortable.</p>
        
        <a href="https://www.salford.gov.uk/housing/housing-advice-and-support/problems-with-your-property/make-a-complaint-about-a-rented-property/" target="_blank" class="btn">Report to Salford Council</a>
    </div>

    <div class="footer">
        <p>Patrick can rip down the paper, but he can't rip down the internet.</p>
    </div>

</body>
</html>
